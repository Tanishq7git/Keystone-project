services:
  db:
    image: postgres:16-alpine
    container_name: keystone-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keystone
      POSTGRES_USER: keystone
      POSTGRES_PASSWORD: keystone
    ports:
      - "5432:5432"
    volumes:
      - keystone_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone -d keystone"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: keystone-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/keystone
      DB_USERNAME: keystone
      DB_PASSWORD: keystone
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-32-bytes-long}
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: keystone-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  keystone_pgdata:
