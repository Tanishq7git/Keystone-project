spring:
  application:
    name: keystone

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/keystone}
    username: ${DB_USERNAME:keystone}
    password: ${DB_PASSWORD:keystone}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

keystone:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-32-bytes-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  sla:
    urgent-hours: 4
    high-hours: 24
    medium-hours: 72
    low-hours: 168

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.zidio.keystone: INFO
    org.springframework.security: WARN
